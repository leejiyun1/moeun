name: Backend Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "EasyBE/**"
      - ".github/workflows/backend-checks.yml"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EasyBE
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv
        uses: actions/cache@v4
        with:
          key: uv-${{ runner.os }}-${{ hashFiles('EasyBE/requirements.txt', 'EasyBE/pyproject.toml', 'EasyBE/uv.lock') }}
          path: ~/.cache/uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Run isort
        run: uv run isort . --check --diff

      - name: Run black
        run: uv run black . --check

      - name: Run mypy
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DJANGO_SECRET_KEY: ci-secret-key
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: moeun
          DB_USER: moeun
          DB_PASSWORD: moeun_local_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: moeun
          POSTGRES_USER: moeun
          POSTGRES_PASSWORD: moeun_local_password
          TZ: Asia/Seoul
        options: >-
          --health-cmd "pg_isready -U moeun -d moeun"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: EasyBE
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv
        uses: actions/cache@v4
        with:
          key: uv-${{ runner.os }}-${{ hashFiles('EasyBE/requirements.txt', 'EasyBE/pyproject.toml', 'EasyBE/uv.lock') }}
          path: ~/.cache/uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DJANGO_SECRET_KEY: ci-secret-key
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: moeun
          DB_USER: moeun
          DB_PASSWORD: moeun_local_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run python manage.py migrate

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DJANGO_SECRET_KEY: ci-secret-key
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: moeun
          DB_USER: moeun
          DB_PASSWORD: moeun_local_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run python manage.py test
