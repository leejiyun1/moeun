name: Frontend Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "ExcellentFE/**"
      - ".github/workflows/frontend-checks.yml"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ExcellentFE
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ExcellentFE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
          VITE_KAKAO_CLIENT_ID: ""
          VITE_KAKAO_REDIRECT_URI: ""
          VITE_NAVER_CLIENT_ID: ""
          VITE_NAVER_REDIRECT_URI: ""
          VITE_GOOGLE_CLIENT_ID: ""
          VITE_GOOGLE_REDIRECT_URI: ""
          VITE_BBATON_CLIENT_ID: ""
          VITE_BBATON_REDIRECT_URI: ""
          VITE_KAKAO_APP_KEY: ""
          VITE_BUILD_OUT_DIR: ../artifacts/frontend/dist
        run: npm run build
