services:
  backend:
    container_name: moeun-backend
    build:
      context: ./EasyBE
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./envs/backend.local.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      ARTIFACTS_DIR: /workspace/artifacts
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - ./EasyBE:/app
      - ./artifacts:/workspace/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moeun-local

  frontend:
    container_name: moeun-frontend
    build:
      context: ./ExcellentFE
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - ./envs/frontend.local.env
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_BUILD_OUT_DIR: /workspace/artifacts/frontend/dist
    ports:
      - "5173:5173"
    volumes:
      - ./ExcellentFE:/app
      - ./artifacts:/workspace/artifacts
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - moeun-local

  db:
    image: postgres:16-alpine
    container_name: moeun-postgres
    environment:
      POSTGRES_DB: moeun
      POSTGRES_USER: moeun
      POSTGRES_PASSWORD: moeun_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moeun -d moeun"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - moeun-local

  redis:
    image: redis:7-alpine
    container_name: moeun-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - moeun-local

networks:
  moeun-local:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
